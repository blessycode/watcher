services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: watcher
      POSTGRES_USER: watcher
      POSTGRES_PASSWORD: watcher
    ports:
      - "5432:5432"
    volumes:
      - watcher_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watcher -d watcher"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://watcher:watcher@postgres:5432/watcher
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: watcher-change-this-in-production
      ENVIRONMENT: development
      ALLOW_PRIVATE_MONITORING: "true"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    command: sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://watcher:watcher@postgres:5432/watcher
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: watcher-change-this-in-production
      ENVIRONMENT: development
      ALLOW_PRIVATE_MONITORING: "true"
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started

  celery-beat:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://watcher:watcher@postgres:5432/watcher
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: watcher-change-this-in-production
      ENVIRONMENT: development
      ALLOW_PRIVATE_MONITORING: "true"
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started

volumes:
  watcher_postgres:
